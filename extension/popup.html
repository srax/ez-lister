<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ezlist</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <div class="brand">
          <img src="assets/icon-48.png" alt="" width="22" height="22">
          <h1>ezlist</h1>
        </div>
      </header>

      <section id="draft" class="card">
        <h2>No vehicle ready</h2>
        <p>Open the dealership inventory and click <b>⚡ List</b> on a car.</p>
      </section>

      <div class="actions">
        <button id="listCurrent" type="button">List this car page</button>
        <button id="facebook" type="button">Open Facebook vehicle form</button>
      </div>

      <p id="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
