name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: carxpert_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d carxpert_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm test -- --test-reporter=dot
      - run: npm run build:ext:staging

      - name: Apply migrations twice
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/carxpert_test
          NODE_ENV: test
        run: >-
          node --input-type=module -e
          "const {runMigrations,pool}=await import('./backend/db.js');
          const first=await runMigrations();
          const second=await runMigrations();
          if (!first.length || second.length) process.exitCode=1;
          await pool.end();"

      - name: PostgreSQL integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/carxpert_test
          NODE_ENV: test
        run: >-
          node --test --test-concurrency=1
          backend/auth-codes.test.js
          backend/ai-limits.test.js
          backend/organization-domain.integration.test.js
